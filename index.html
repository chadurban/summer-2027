<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer 2027 — Destination Comparison</title>
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3347;--text:#e4e6ed;--dim:#8b8fa3;
        --accent:#2ecc71;--accent2:#f9ca24;--blue:#54a0ff;--red:#ff6b6b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:880px;margin:0 auto;padding:16px;}
  header{text-align:center;padding:22px 0 8px;}
  header h1{font-size:1.45rem;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
  header .sub{color:var(--dim);font-size:0.84rem;}
  .updated{text-align:center;color:var(--dim);font-size:0.72rem;margin:4px 0 14px;}
  .note{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent2);border-radius:10px;padding:11px 13px;font-size:0.8rem;color:var(--dim);line-height:1.5;margin-bottom:16px;}
  .toggle{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
  .toggle button{padding:9px 18px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--dim);font-size:0.84rem;font-weight:600;cursor:pointer;min-height:42px;}
  .toggle button.active{background:var(--accent);color:#07210f;border-color:var(--accent);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:14px;}
  .dn{font-size:1.08rem;font-weight:700;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .dn .gw{font-size:0.72rem;color:var(--dim);font-weight:500;}
  .row{display:grid;grid-template-columns:96px 1fr;gap:12px;align-items:start;padding:9px 0;border-top:1px solid var(--border);}
  .cab{font-size:0.74rem;text-transform:uppercase;letter-spacing:0.04em;color:var(--dim);font-weight:600;padding-top:3px;}
  .opt b{font-size:1.18rem;color:var(--accent);font-variant-numeric:tabular-nums;}
  .opt.nour b{color:var(--accent2);}
  .opt .u{font-size:0.72rem;color:var(--dim);}
  .opt .sub2{font-size:0.74rem;color:var(--dim);}
  .opt .rt{font-size:0.78rem;color:var(--text);}
  .badge{display:inline-block;font-size:0.64rem;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--accent);color:#07210f;margin-left:6px;vertical-align:middle;}
  .none{color:var(--dim);font-size:0.84rem;font-style:italic;}
  .foot{font-size:0.74rem;color:var(--dim);line-height:1.6;margin-top:18px;padding:12px;background:var(--surface2);border-radius:10px;}
  .muted{color:var(--dim);text-align:center;padding:30px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>✈️ Summer 2027 — Where To?</h1>
    <div class="sub">Japan · Brazil (Vitória) · Iberia — best business + premium award, head to head</div>
  </header>
  <div class="updated" id="updated"></div>
  <div class="note" id="loadnote"></div>
  <div class="toggle" id="toggle">
    <button data-p="3" class="active">3 travelers</button>
    <button data-p="4">4 travelers</button>
  </div>
  <div id="cards"><div class="muted">Loading…</div></div>
  <div class="foot" id="foot"></div>
</div>

<script id="cmp-data" type="application/json">{"lastUpdated":"2026-06-27T02:16:34Z","window":"early\u2013mid June 2027 \u00b7 7\u201315 nights","dests":[{"key":"japan","name":"Japan / Korea","hop":null,"gateways":"HND/ICN/NRT","cabins":{"business":{"n":8,"p3":null,"p4":null},"premium":{"n":3,"p3":{"ow":140500,"route":"JFK\u2192ICN (1-stop)","seats":9,"date":"2027-06-03","direct":false,"airlines":"AF","via":"UR/MR \u2192 Flying Blue","ur":true},"p4":{"ow":140500,"route":"JFK\u2192ICN (1-stop)","seats":9,"date":"2027-06-03","direct":false,"airlines":"AF","via":"UR/MR \u2192 Flying Blue","ur":true}}}},{"key":"brazil","name":"Brazil \u00b7 Vit\u00f3ria","hop":"+ VIX hop (~$60\u2013130)","gateways":"CNF/GIG/GRU/VCP","cabins":{"business":{"n":0,"p3":null,"p4":null},"premium":{"n":0,"p3":null,"p4":null}}},{"key":"iberia","name":"Iberia \u00b7 Lisbon/Madrid","hop":null,"gateways":"LIS/MAD/OPO/SVQ","cabins":{"business":{"n":8,"p3":{"ow":130000,"route":"BOS\u2192LIS (1-stop)","seats":7,"date":"2027-06-08","direct":false,"airlines":"AF","via":"UR/MR \u2192 Flying Blue","ur":true},"p4":{"ow":130000,"route":"BOS\u2192LIS (1-stop)","seats":7,"date":"2027-06-08","direct":false,"airlines":"AF","via":"UR/MR \u2192 Flying Blue","ur":true}},"premium":{"n":8,"p3":{"ow":62000,"route":"BOS\u2192MAD (1-stop)","seats":3,"date":"2027-06-08","direct":false,"airlines":"AF","via":"UR/MR \u2192 Flying Blue","ur":true},"p4":{"ow":62500,"route":"BOS\u2192MAD (1-stop)","seats":9,"date":"2027-06-01","direct":false,"airlines":"AF","via":"UR/MR \u2192 Flying Blue","ur":true}}}}],"errors":[]}</script>
<script>
const D = (()=>{ try{ return JSON.parse(document.getElementById('cmp-data').textContent||'{}'); }catch(e){ return {}; } })();
let party = 3;
const k = n => n>=1000 ? (n/1000).toFixed(n>=100000?0:0)+'K' : String(n);

function render(){
  const cards = document.getElementById('cards');
  const dests = D.dests || [];
  if(!dests.length){ cards.innerHTML = '<div class="muted">First scan pending — runs daily and fills in here.</div>'; return; }
  // cheapest total per cabin (for the ★ leader badge)
  const best = {business:Infinity, premium:Infinity};
  dests.forEach(d=>['business','premium'].forEach(cab=>{
    const pk = (d.cabins[cab]||{})[party===3?'p3':'p4'];
    if(pk) best[cab] = Math.min(best[cab], pk.ow*2*party);
  }));
  const cell = (cabObj, cab) => {
    const pk = (cabObj||{})[party===3?'p3':'p4'];
    if(!pk) return '<span class="none">none in window yet</span>';
    const rt = pk.ow*2, tot = rt*party;
    const leader = tot===best[cab] ? '<span class="badge">★ cheapest</span>' : '';
    return `<div class="opt ${pk.ur?'':'nour'}"><b>${k(tot)}</b> <span class="u">pts total${leader}</span>
      <span class="sub2">(${k(pk.ow)} ow · ~${k(rt)} RT/pp)</span><br>
      <span class="rt">${pk.route} · ${pk.seats} seat${pk.seats==1?'':'s'} · ${pk.via}${pk.ur?'':' · ⚠ not from your UR/MR'}</span></div>`;
  };
  cards.innerHTML = dests.map(d=>`
    <div class="card">
      <div class="dn">${d.name}<span class="gw">${d.gateways}${d.hop?' '+d.hop:''}</span></div>
      <div class="row"><div class="cab">Business</div>${cell(d.cabins.business,'business')}</div>
      <div class="row"><div class="cab">Premium econ</div>${cell(d.cabins.premium,'premium')}</div>
    </div>`).join('');
}

document.querySelectorAll('#toggle button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#toggle button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); party = +b.dataset.p; render();
}));

document.getElementById('updated').textContent = D.lastUpdated ? 'Updated '+new Date(D.lastUpdated).toLocaleString()+' · '+(D.window||'') : '';
document.getElementById('loadnote').innerHTML = '🌱 <b>Jun 2027 is ~12 months out — award windows are just opening.</b> Only Flying Blue (AF/KL) has loaded so far, so most cells say "none yet." This rescans daily; as United, Aeroplan, Delta and ANA windows roll open over the next few weeks, the cells fill in and prices drop toward saver levels (the control scan showed Iberia business hitting ~75–88K).';
document.getElementById('foot').innerHTML = '<b>How to read it:</b> "pts total" = round-trip award miles for the whole party (one-way × 2 × travelers — return windows aren\'t open yet, so RT is estimated as 2× the live one-way). Green = bookable from your Chase UR / Amex MR; gold ⚠ = needs miles you don\'t hold. Brazil adds a cheap VIX hop on top. Cash comparison turns on once Jun-2027 fares go on sale (~Aug 2026). 💡 <b>Lisbon watch:</b> business cash deals to LIS run cheap (BOS→LIS ~$3,100 RT via Azores/TAP). Paid with UR via the Chase portal at up to 2¢ Boost (~156K UR), that rivals the saver award but is a confirmed ticket that earns miles and is always available. Could be the Lisbon play.';
render();
</script>
</body>
</html>
